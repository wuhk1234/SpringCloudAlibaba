server:
  port: 80

spring:
  application:
    name: gateway
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.176.133:8847
        group: DEFAULT_GROUP  # 缺省即可
        namespace: 1da0831d-139f-4df3-9926-c7371ea84aba # 命令空间ID
        username: nacos
        password: nacos
        # 设置永久实例
        ephemeral: false
      config:
        server-addr: 192.168.176.133:8847   # nacos地址
        group: DEFAULT_GROUP  # 缺省即可
        namespace: 1da0831d-139f-4df3-9926-c7371ea84aba # 命令空间ID
        file-extension: yaml  # 必须修改成yaml
        prefix: ${spring.application.name} # 缺省即可
        username: nacos
        password: nacos
        shared-configs:
          - data-id: application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
            group: DEFAULT_GROUP
            refresh: true # 是否自动刷新配置，默认为 false