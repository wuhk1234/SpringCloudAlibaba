server:
  port: 8010

spring:
  application:
    name: sentinel
  cloud:
    nacos:
      server-addr: http://192.168.176.133:8847
      username: nacos
      password: nacos
      config:
        namespace: public
      discovery:
        # 设置永久实例
        ephemeral: false
        # 设置永久实例
        #ephemeral: false
        #namespoce: public # 相同持征的服务进行归类分组管理
        #ephemerol: false #永久实例 哪怕宕机了也额额不会删除实例
        # service:默认收${spring.application,name}， 也可以通过该选项配置
        #group:默认DEFAULT_GROUP 更细的相同特征的服务进行归类分组管理
        #weight: 通常要结合 安奖 权重的负载均衡， 权重越高分配的流量就越大
        #metadata: version=1 可以结合元数据做扩展
    #fegin接口调用，必须开启此负载均衡，否则会报：No Feign Client for loadBalancing defined. Did you forget to include spring-cloud-starter-netflix-ribbon?
    loadbalancer:
      ribbon:
        enabled: false
    sentinel:
      enable: true
      filter:
        enabled: false
      eager: true #立即加载
      transport:
        dashboard: localhost:8858
        #配置Sentinel dashboard地址
        #dashboard: 192.168.176.133:8858 #配置Sentinel dashboard地址
      # 链路流控:因为链路流控没有维护树，需要加web-context-unify: false，否则链路流控不生效
      web-context-unify: false
      #流控规则，resource:资源名称，即流控规则的作用对象；controlBehavior:流量控制效果(直接拒绝，Warm UP，匀速等待);count:限流的阈值;grade:限流阈值的类型(QPS活线程数);limitApp:流控针对的调用来源(若为default则不区分调用来源);strategy:调用关系限流策略
      datasource:
        flow-rule:
          nacos:
            server-addr: 192.168.176.133:8847
            username: nacos
            password: nacos
            dataId: sentinel-flowrule
            groupId: DEFAULT_GROUP
            rule-type: flow
#开启fegin接口降级处理，整合sentinel
feign:
  sentinel:
    enabled: true